<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="VaultGuard — 基于 TokenCore 的安全自托管网页钱包，私钥不离设备"
    />
    <title>VaultGuard · 自托管安全钱包</title>
    <script type="module" crossorigin src="./assets/index-BcyJTTm3.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CgrdzTE2.css">
  </head>
  <body>
    <style>
      :root {
        --bg: #0b0e14;
        --primary: #3d8bfd;
        --text: #e8ecf4;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei",
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
      }
      #boot-hint {
        max-width: 480px;
        margin: 0 auto;
        padding: 2rem 1.25rem;
        line-height: 1.6;
      }
      #boot-hint h1 {
        font-size: 1.5rem;
        color: var(--primary);
        margin: 0 0 0.5rem;
      }
      #boot-hint code {
        background: #161b26;
        padding: 0.15rem 0.4rem;
        border-radius: 6px;
        font-size: 0.9em;
      }
      #boot-hint .warn {
        color: #f87171;
        font-weight: 600;
      }
    </style>
    <div id="boot-hint">
      <h1>VaultGuard</h1>
      <p id="boot-msg">正在加载 TokenCore…</p>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        if (location.protocol === "file:") {
          document.getElementById("boot-msg").innerHTML =
            '<span class="warn">不能双击打开本文件。</span>请在项目文件夹打开终端，执行：<br><br><code>npm install</code><br><code>npm run dev</code><br><br>然后访问 <code>http://localhost:5173</code>';
          throw new Error("file:// blocked");
        }
      })();
    </script>
  </body>
</html>
